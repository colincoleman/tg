name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install autoconf automake libtool gtk+3 portaudio fftw

      - name: Build source tarball
        run: |
          ./autogen.sh
          ./configure --without-python
          make dist

      - name: Get version
        id: version
        run: echo "version=$(cat version)" >> "$GITHUB_OUTPUT"

      - name: Compute sha256
        id: sha
        run: |
          sha=$(shasum -a 256 tg-timer-${{ steps.version.outputs.version }}.tar.gz | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tg-timer-${{ steps.version.outputs.version }}.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          TAG: ${{ github.ref_name }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/colincoleman/homebrew-tg.git tap
          cd tap
          sed -i '' \
            -e "s|url \".*\"|url \"https://github.com/colincoleman/tg/releases/download/${TAG}/tg-timer-${VERSION}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            Formula/tg-timer.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "tg-timer ${VERSION}"
          git push

  release-linux-deb:
    needs: release-macos
    # Build on the 22.04 baseline so the .deb installs on 22.04, 24.04 and
    # newer (older library requirements are satisfied by newer systems).
    # Build both architectures: amd64 for PCs, arm64 for Apple Silicon VMs,
    # Raspberry Pi, and ARM servers.
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
          - runner: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            devscripts debhelper \
            libgtk-3-dev portaudio19-dev libfftw3-dev

      - name: Build .deb package
        run: ./packaging/make_deb.sh

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: deb/*.deb
